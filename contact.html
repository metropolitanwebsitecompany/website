<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Metropolitan</title>
    <style>
        :root{--bg:#ffffff;--accent:#0b74de;--muted:#6b7280;--card:#f7f9fb;--radius:10px}
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;color:#0f1724;background:var(--bg);-webkit-font-smoothing:antialiased}
        .site{max-width:900px;margin:48px auto;padding:28px}
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        a.logo{font-weight:700;color:var(--accent);text-decoration:none;font-size:1.125rem}
        nav a{color:var(--muted);text-decoration:none;margin-left:16px;font-size:0.95rem}
        .card{background:var(--card);padding:28px;border-radius:var(--radius);box-shadow:0 6px 18px rgba(12,16,23,0.06)}
        h1{margin:0 0 8px;font-size:1.6rem;color:#081026}
        p.lead{margin:0 0 20px;color:var(--muted);line-height:1.5}
        form{display:grid;gap:12px}
        label{font-size:0.85rem;color:#0b1724}
        input[type="text"],input[type="email"],textarea{
            width:100%;padding:12px;border:1px solid #e6eef7;border-radius:8px;background:#fff;font-size:0.95rem;color:#0b1724
        }
        textarea{min-height:140px;resize:vertical}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .actions{display:flex;gap:12px;align-items:center;margin-top:6px}
        button{background:var(--accent);color:#fff;border:0;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer}
        .muted{color:var(--muted);font-size:0.92rem}
        address{font-style:normal;color:var(--muted);margin-top:12px}
        @media (max-width:640px){.site{margin:20px;padding:18px}.row{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <main class="site">
        <header>
            <a class="logo" href="index.html">Metropolitan</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>

        <section class="card" aria-labelledby="contact-heading">
            <h1 id="contact-heading">Let's build something great</h1>
            <p class="lead">Reach out for a free consultation. Tell us about your project and timeline, and we'll get back within one business day.</p>

            <form action="mailto:hello@metropolitanwebsitecompany.com" method="post" enctype="text/plain" novalidate>
                <div class="row">
                    <div>
                        <label for="name">Name</label>
                        <input id="name" name="Name" type="text" required placeholder="Your name">
                    </div>
                    <div>
                        <label for="company">Company</label>
                        <input id="company" name="Company" type="text" placeholder="Company (optional)">
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label for="email">Email</label>
                        <input id="email" name="Email" type="email" required placeholder="you@business.com">
                    </div>
                    <div>
                        <label for="phone">Phone</label>
                        <input id="phone" name="Phone" type="text" placeholder="(optional)">
                    </div>
                </div>

                <div>
                    <label for="message">Project details</label>
                    <textarea id="message" name="Message" placeholder="Describe your project, budget, or timeline" required></textarea>
                </div>

                <div class="actions">
                    <button type="submit">Send message</button>
                    <span class="muted">Or email us directly: <a href="mailto:hello@metropolitanwebsitecompany.com">hello@metropolitanwebsitecompany.com</a></span>
                </div>

                <address>
                    Metropolitan — Toledo, OH<br>metropolitanwebsitecompany.com
                </address>
            </form>
        </section>
    </main>
</body>
</html>
