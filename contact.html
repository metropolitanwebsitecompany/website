<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Metropolitan</title>
    <style>
        :root {
            --black: #0f0f0f;
            --gray: #666;
            --rule: #e0e0e0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 680px;
            margin: 0 auto;
            padding: 56px 24px 80px;
            background: #fff;
            color: var(--black);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--rule);
            margin-bottom: 80px;
        }
        .wordmark {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--black);
        }
        .nav-links a {
            font-size: 0.85rem;
            color: var(--gray);
            text-decoration: none;
            margin-left: 24px;
        }
        .nav-links a:hover { color: var(--black); }
        .nav-links a[aria-current] { color: var(--black); }
        .label {
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            color: var(--gray);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0 0 16px;
        }
        p.lead {
            font-size: 1.05rem;
            color: #333;
            margin: 0 0 48px;
            max-width: 520px;
        }
        form { display: grid; gap: 20px; }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field { display: grid; gap: 6px; }
        label {
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            color: var(--gray);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--rule);
            border-radius: 4px;
            background: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--black);
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus { border-color: var(--black); }
        textarea { min-height: 140px; resize: vertical; }
        .actions {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 8px;
        }
        button {
            padding: 11px 22px;
            background: var(--black);
            color: #fff;
            border: 0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background: #2a2a2a; }
        .sub-link {
            font-size: 0.875rem;
            color: var(--gray);
            text-decoration: none;
        }
        .sub-link:hover { color: var(--black); }
        footer {
            margin-top: 100px;
            padding-top: 20px;
            border-top: 1px solid var(--rule);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #bbb;
        }
        @media (max-width: 560px) {
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <a class="wordmark" href="/">Metropolitan</a>
        <div class="nav-links">
            <a href="/contact.html" aria-current="page">Contact</a>
            <a href="/stripe.html">Stripe</a>
        </div>
    </nav>

    <p class="label">Toledo, Ohio</p>
    <h1>Let's talk about your project.</h1>
    <p class="lead">Free consultation. Tell us what you're building and we'll get back within one business day.</p>

    <form action="mailto:hello@metropolitanwebsitecompany.com" method="post" enctype="text/plain" novalidate>
        <div class="row">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" name="Name" type="text" required placeholder="Your name" />
            </div>
            <div class="field">
                <label for="company">Company</label>
                <input id="company" name="Company" type="text" placeholder="Optional" />
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="Email" type="email" required placeholder="you@company.com" />
            </div>
            <div class="field">
                <label for="phone">Phone</label>
                <input id="phone" name="Phone" type="text" placeholder="Optional" />
            </div>
        </div>

        <div class="field">
            <label for="message">Project details</label>
            <textarea id="message" name="Message" required placeholder="What are you building? Any timeline or budget in mind?"></textarea>
        </div>

        <div class="actions">
            <button type="submit">Send message</button>
            <a class="sub-link" href="mailto:hello@metropolitanwebsitecompany.com">hello@metropolitanwebsitecompany.com</a>
        </div>
    </form>

    <footer>metropolitanwebsitecompany.com</footer>
</body>
</html>
